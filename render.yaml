services:
  # Backend — FastAPI (runs from repo root so `backend.` imports work)
  - type: web
    name: pdf-translator-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ADOBE_CLIENT_ID
        sync: false
      - key: ADOBE_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PROJECTS_DIR
        value: /data/projects
    disk:
      name: project-data
      mountPath: /data/projects
      sizeGB: 1

  # Frontend — React static site
  - type: web
    name: pdf-translator-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
